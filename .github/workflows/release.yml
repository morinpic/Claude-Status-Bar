name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: macos-26
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Import Developer ID certificate
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PWD: ${{ secrets.MACOS_CERTIFICATE_PWD }}
          MACOS_CI_KEYCHAIN_PWD: ${{ secrets.MACOS_CI_KEYCHAIN_PWD }}
        run: |
          echo "$MACOS_CERTIFICATE" | base64 --decode > certificate.p12
          security create-keychain -p "$MACOS_CI_KEYCHAIN_PWD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$MACOS_CI_KEYCHAIN_PWD" build.keychain
          security import certificate.p12 -k build.keychain -P "$MACOS_CERTIFICATE_PWD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$MACOS_CI_KEYCHAIN_PWD" build.keychain
          rm certificate.p12

      - name: Build Release
        run: |
          xcodebuild -scheme ClaudeStatusBar \
            -configuration Release \
            -derivedDataPath DerivedData \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="${{ secrets.MACOS_CERTIFICATE_NAME }}" \
            DEVELOPMENT_TEAM="${{ secrets.MACOS_NOTARIZATION_TEAM_ID }}" \
            OTHER_CODE_SIGN_FLAGS="--options runtime --timestamp" \
            CODE_SIGN_INJECT_BASE_ENTITLEMENTS=NO \
            build

      - name: Verify code signature
        run: |
          APP_PATH="DerivedData/Build/Products/Release/ClaudeStatusBar.app"
          codesign --verify --deep --strict --verbose=2 "$APP_PATH"
          codesign -dv "$APP_PATH"

      - name: Notarize app
        env:
          MACOS_NOTARIZATION_APPLE_ID: ${{ secrets.MACOS_NOTARIZATION_APPLE_ID }}
          MACOS_NOTARIZATION_TEAM_ID: ${{ secrets.MACOS_NOTARIZATION_TEAM_ID }}
          MACOS_NOTARIZATION_PWD: ${{ secrets.MACOS_NOTARIZATION_PWD }}
        run: |
          APP_PATH="DerivedData/Build/Products/Release/ClaudeStatusBar.app"

          xcrun notarytool store-credentials "notarytool-profile" \
            --apple-id "$MACOS_NOTARIZATION_APPLE_ID" \
            --team-id "$MACOS_NOTARIZATION_TEAM_ID" \
            --password "$MACOS_NOTARIZATION_PWD"

          ditto -c -k --keepParent "$APP_PATH" "notarization.zip"

          SUBMIT_OUTPUT=$(xcrun notarytool submit "notarization.zip" \
            --keychain-profile "notarytool-profile" \
            --wait \
            --timeout 30m 2>&1) || true
          echo "$SUBMIT_OUTPUT"

          SUBMISSION_ID=$(echo "$SUBMIT_OUTPUT" | grep "id:" | head -1 | awk '{print $2}')

          if echo "$SUBMIT_OUTPUT" | grep -q "status: Invalid"; then
            echo "::error::Notarization failed. Fetching log..."
            xcrun notarytool log "$SUBMISSION_ID" \
              --keychain-profile "notarytool-profile" \
              notarization-log.json || true
            cat notarization-log.json || true
            exit 1
          fi

          xcrun stapler staple "$APP_PATH"

      - name: Verify notarization
        run: |
          APP_PATH="DerivedData/Build/Products/Release/ClaudeStatusBar.app"
          spctl --assess --type execute --verbose=2 "$APP_PATH"

      - name: Create zip
        run: |
          APP_PATH="DerivedData/Build/Products/Release/ClaudeStatusBar.app"
          ZIP_NAME="ClaudeStatusBar-${{ steps.version.outputs.VERSION }}.zip"
          cd $(dirname "$APP_PATH")
          zip -r "$ZIP_NAME" ClaudeStatusBar.app
          echo "ZIP_PATH=$(pwd)/$ZIP_NAME" >> $GITHUB_ENV
          echo "ZIP_NAME=$ZIP_NAME" >> $GITHUB_ENV

      - name: Calculate SHA256
        id: sha
        run: |
          SHA=$(shasum -a 256 "$ZIP_PATH" | awk '{print $1}')
          echo "SHA256=$SHA" >> $GITHUB_OUTPUT

      - name: Extract changelog for this version
        id: changelog
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          NOTES=$(awk "/^## \[${VERSION}\]/{flag=1; next} /^## \[/{flag=0} flag" docs/CHANGELOG.md)
          echo "NOTES<<EOF" >> $GITHUB_OUTPUT
          echo "$NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ZIP_PATH }}
          body: ${{ steps.changelog.outputs.NOTES }}
          name: v${{ steps.version.outputs.VERSION }}

      - name: Update Homebrew Cask
        env:
          TAP_TOKEN: ${{ secrets.TAP_TOKEN }}
        run: |
          if [ -z "$TAP_TOKEN" ]; then
            echo "TAP_TOKEN not set, skipping Homebrew Cask update"
            exit 0
          fi
          git clone https://x-access-token:${TAP_TOKEN}@github.com/morinpic/homebrew-tap.git
          cd homebrew-tap
          CASK_FILE="Casks/claude-status-bar.rb"
          sed -i '' "s|version \".*\"|version \"${{ steps.version.outputs.VERSION }}\"|" "$CASK_FILE"
          sed -i '' "s|sha256 \".*\"|sha256 \"${{ steps.sha.outputs.SHA256 }}\"|" "$CASK_FILE"
          sed -i '' "s|ClaudeStatusBar-.*\.zip|ClaudeStatusBar-${{ steps.version.outputs.VERSION }}.zip|" "$CASK_FILE"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "$CASK_FILE"
          git commit -m "Update claude-status-bar to ${{ steps.version.outputs.VERSION }}"
          git push

      - name: Cleanup keychain
        if: always()
        run: |
          security delete-keychain build.keychain 2>/dev/null || true
